# Docs:
# https://github.com/Azure/webapps-deploy
# https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - swp391-parking-backend-2005

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/main_swp391-parking-backend-2005.yml"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "microsoft"
          cache: "maven"
          cache-dependency-path: backend/pom.xml

      - name: Make Maven Wrapper executable
        working-directory: backend
        run: chmod +x mvnw

      - name: Build backend with Maven
        working-directory: backend
        run: ./mvnw clean package -DskipTests

      - name: Verify generated JAR
        run: |
          echo "Generated files:"
          ls -lah backend/target

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: backend/target/*.jar
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: app

      - name: Verify downloaded artifact
        run: |
          echo "Downloaded files:"
          ls -lah app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A9DD605C971E49B9AF8C39B1375B0A3F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B17B9E97D15D4FB3B4609F882E857F2D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_02CDE4B29E9D4BAFBFDA93428540600F }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "swp391-parking-backend-2005"
          slot-name: "Production"
          package: "app/*.jar"
