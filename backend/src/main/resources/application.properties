spring.application.name=backend

# ================= DATABASE =================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect


# ================= SERVER =================

server.port=${PORT:8080}
server.address=0.0.0.0


# ================= JWT =================

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}


# ================= EMAIL =================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# ================= GOOGLE LOGIN =================

google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:5173/auth/google/callback}


# ================= PAYOS =================

payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}


# ================= APPLICATION URL =================

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}


# ================= PLATE RECOGNIZER CLOUD =================

plate-recognizer.api-url=https://api.platerecognizer.com/v1/plate-reader/
plate-recognizer.api-token=${PLATE_RECOGNIZER_API_TOKEN}
plate-recognizer.region=${PLATE_RECOGNIZER_REGION:vn}

# Kết quả dưới mức này sẽ yêu cầu nhân viên kiểm tra lại.
plate-recognizer.min-confidence=${PLATE_RECOGNIZER_MIN_CONFIDENCE:0.75} 

# Timeout kết nối và đọc response từ Cloud API.
plate-recognizer.connect-timeout-seconds=${PLATE_RECOGNIZER_CONNECT_TIMEOUT:5}
plate-recognizer.read-timeout-seconds=${PLATE_RECOGNIZER_READ_TIMEOUT:15}


# ================= FILE UPLOAD =================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================= TIMEZONE =================

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
app.business-time-zone=${APP_BUSINESS_TIME_ZONE:Asia/Ho_Chi_Minh}